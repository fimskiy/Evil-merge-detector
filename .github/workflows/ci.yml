name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint action entrypoint
        run: shellcheck --severity=warning action/entrypoint.sh

  test-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Build binary
        run: |
          mkdir -p ~/.local/bin
          go build -o ~/.local/bin/evilmerge ./cmd/evilmerge
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run action (no evil merges expected in this repo)
        id: run-action
        run: bash action/entrypoint.sh
        env:
          INPUT_VERSION: prebuilt
          INPUT_FAIL_ON: warning
          INPUT_SEVERITY: info
          INPUT_BRANCH: ""
          INPUT_SINCE: ""
          INPUT_UPLOAD_SARIF: "false"

      - name: Verify outputs
        run: |
          echo "found=${{ steps.run-action.outputs.found }}"
          echo "count=${{ steps.run-action.outputs.count }}"
          [[ "${{ steps.run-action.outputs.found }}"  != "" ]] || { echo "ERROR: 'found' output is empty"; exit 1; }
          [[ "${{ steps.run-action.outputs.count }}"  != "" ]] || { echo "ERROR: 'count' output is empty"; exit 1; }

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: golangci-lint
        run: golangci-lint run ./...

  release:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Extract changelog
        run: awk '/^## \[/{if(p)exit;p=1;next}p' CHANGELOG.md > notes.md

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --release-notes=notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
