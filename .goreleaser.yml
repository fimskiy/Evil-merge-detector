version: 2

project_name: evilmerge

builds:
  - main: ./cmd/evilmerge
    binary: evilmerge
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: ['tar.gz']
    format_overrides:
      - goos: windows
        formats: ['zip']
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: fimskiy
      name: homebrew-tap
    homepage: "https://github.com/fimskiy/evil-merge-detector"
    description: "Detect evil merges in Git repositories"
    install: |
      bin.install "evilmerge"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
