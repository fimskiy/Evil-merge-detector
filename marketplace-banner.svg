<svg xmlns="http://www.w3.org/2000/svg" width="965" height="482" viewBox="0 0 965 482">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="965" height="482" fill="url(#bg)"/>
  <rect width="965" height="482" fill="url(#glow)"/>

  <!-- Git graph lines — decorative -->
  <g stroke="#21262d" stroke-width="1.5" opacity="0.7">
    <!-- vertical branch lines -->
    <line x1="120" y1="0" x2="120" y2="482"/>
    <line x1="180" y1="80" x2="180" y2="300"/>
    <line x1="240" y1="140" x2="240" y2="260"/>
    <!-- horizontal connectors -->
    <line x1="120" y1="100" x2="180" y2="100"/>
    <line x1="120" y1="200" x2="240" y2="200"/>
    <line x1="120" y1="300" x2="180" y2="300"/>
    <line x1="180" y1="260" x2="240" y2="260"/>
  </g>

  <!-- Git commit nodes -->
  <g fill="#30363d" stroke="#8b949e" stroke-width="1.5">
    <circle cx="120" cy="60" r="7"/>
    <circle cx="120" cy="100" r="7"/>
    <circle cx="180" cy="100" r="7"/>
    <circle cx="120" cy="160" r="7"/>
    <circle cx="120" cy="200" r="7"/>
    <circle cx="240" cy="200" r="7"/>
    <circle cx="120" cy="260" r="7"/>
    <circle cx="180" cy="260" r="7"/>
    <circle cx="120" cy="320" r="7"/>
    <circle cx="120" cy="380" r="7"/>
    <circle cx="120" cy="440" r="7"/>
  </g>

  <!-- Evil merge commit — highlighted red -->
  <circle cx="240" cy="200" r="10" fill="#dc2626" stroke="#f87171" stroke-width="2"/>

  <!-- Shield — large, right side, subtle -->
  <g transform="translate(620, 41) scale(0.9)" opacity="0.12">
    <path d="M160 15L277.5 55L277.5 165C277.5 227.5 220.5 278.5 160 300.5C99.5 278.5 42.5 227.5 42.5 165L42.5 55Z" fill="#dc2626"/>
    <path d="M160 38.75L260.5 73.75L260.5 165C260.5 212 211.5 260.75 160 281.5C108.5 260.75 59.5 212 59.5 165L59.5 73.75Z" fill="#b91c1c"/>
    <line x1="160" y1="105" x2="114" y2="160" stroke="white" stroke-width="16" stroke-linecap="round"/>
    <line x1="160" y1="105" x2="206" y2="160" stroke="white" stroke-width="16" stroke-linecap="round"/>
    <line x1="114" y1="160" x2="160" y2="227.5" stroke="white" stroke-width="16" stroke-linecap="round"/>
    <line x1="206" y1="160" x2="160" y2="227.5" stroke="white" stroke-width="16" stroke-linecap="round"/>
    <circle cx="160" cy="105" r="17.5" fill="white"/>
    <circle cx="114" cy="160" r="15" fill="white"/>
    <circle cx="160" cy="227.5" r="16.25" fill="white"/>
  </g>

  <!-- Subtle dot grid — right half -->
  <g fill="#21262d" opacity="0.5">
    <rect x="400" y="40" width="2" height="2" rx="1"/>
    <rect x="440" y="40" width="2" height="2" rx="1"/>
    <rect x="480" y="40" width="2" height="2" rx="1"/>
    <rect x="520" y="40" width="2" height="2" rx="1"/>
    <rect x="560" y="40" width="2" height="2" rx="1"/>
    <rect x="600" y="40" width="2" height="2" rx="1"/>
    <rect x="400" y="80" width="2" height="2" rx="1"/>
    <rect x="440" y="80" width="2" height="2" rx="1"/>
    <rect x="480" y="80" width="2" height="2" rx="1"/>
    <rect x="520" y="80" width="2" height="2" rx="1"/>
    <rect x="560" y="80" width="2" height="2" rx="1"/>
    <rect x="600" y="80" width="2" height="2" rx="1"/>
    <rect x="400" y="120" width="2" height="2" rx="1"/>
    <rect x="440" y="120" width="2" height="2" rx="1"/>
    <rect x="480" y="120" width="2" height="2" rx="1"/>
    <rect x="520" y="120" width="2" height="2" rx="1"/>
    <rect x="560" y="120" width="2" height="2" rx="1"/>
    <rect x="600" y="120" width="2" height="2" rx="1"/>
    <rect x="400" y="160" width="2" height="2" rx="1"/>
    <rect x="440" y="160" width="2" height="2" rx="1"/>
    <rect x="480" y="160" width="2" height="2" rx="1"/>
    <rect x="520" y="160" width="2" height="2" rx="1"/>
    <rect x="560" y="160" width="2" height="2" rx="1"/>
    <rect x="600" y="160" width="2" height="2" rx="1"/>
    <rect x="400" y="200" width="2" height="2" rx="1"/>
    <rect x="440" y="200" width="2" height="2" rx="1"/>
    <rect x="480" y="200" width="2" height="2" rx="1"/>
    <rect x="520" y="200" width="2" height="2" rx="1"/>
    <rect x="560" y="200" width="2" height="2" rx="1"/>
    <rect x="600" y="200" width="2" height="2" rx="1"/>
