# Evil Merge Detector — GitLab CI template
#
# Add this job to your .gitlab-ci.yml to scan merge requests for evil merges.
# The job downloads the evilmerge binary and reports findings.
#
# Usage: copy this file or merge the job into your existing .gitlab-ci.yml.

evil-merge-check:
  stage: test
  image: alpine:3.19
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    EVILMERGE_VERSION: "latest"
    EVILMERGE_FAIL_ON: "warning"   # info | warning | critical
  before_script:
    - apk add --no-cache curl jq git
    - |
      if [ "$EVILMERGE_VERSION" = "latest" ]; then
        EVILMERGE_VERSION=$(curl -sL https://api.github.com/repos/evilmerge-dev/evil-merge-detector/releases/latest \
          | jq -r '.tag_name' | sed 's/^v//')
      fi
      OS="linux"
      ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
      ARCHIVE="evilmerge_${EVILMERGE_VERSION}_${OS}_${ARCH}.tar.gz"
      curl -sL --fail \
        "https://github.com/evilmerge-dev/evil-merge-detector/releases/download/v${EVILMERGE_VERSION}/${ARCHIVE}" \
        | tar -xz -C /usr/local/bin evilmerge
      chmod +x /usr/local/bin/evilmerge
  script:
    - evilmerge scan --fail-on="$EVILMERGE_FAIL_ON" .
  allow_failure: false
